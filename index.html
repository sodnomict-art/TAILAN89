<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Сургалтын Тайлан | Official Premium Edition</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            perspective: 1200px;
            background-color: #f8fafc;
            color: #1E293B;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* --- Dynamic Animated Background --- */
        .vibrant-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -4;
            background: linear-gradient(-45deg, #eef2ff, #fdf2f8, #f0fdf4, #fffbeb);
            background-size: 400% 400%;
            animation: gradient-shift-bg 15s ease infinite;
            transition: animation-duration 1s ease;
        }
        .vibrant-bg.recording-fast {
            animation: gradient-shift-bg 6s ease infinite;
        }
        @keyframes gradient-shift-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Continuous Ambient Particles (Video Optimization) --- */
        @keyframes float-complex-1 {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(30px, -40px) scale(1.1) rotate(15deg); }
            66% { transform: translate(-20px, 30px) scale(0.9) rotate(-10deg); }
            100% { transform: translate(0, 0) scale(1) rotate(0deg); }
        }
        @keyframes float-complex-2 {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(-40px, 30px) scale(0.9) rotate(-15deg); }
            66% { transform: translate(30px, -20px) scale(1.1) rotate(10deg); }
            100% { transform: translate(0, 0) scale(1) rotate(0deg); }
        }
        
        .ambient-p-1 { animation: float-complex-1 20s infinite ease-in-out alternate; }
        .ambient-p-2 { animation: float-complex-2 18s infinite ease-in-out alternate; }
        .ambient-p-3 { animation: float-complex-1 22s infinite ease-in-out alternate-reverse; }

        /* --- Ken Burns Slow Pan (Cinematic Feel) --- */
        @keyframes slow-pan {
            0% { transform: scale(1) translate(0, 0); }
            25% { transform: scale(1.03) translate(1%, 1%); }
            50% { transform: scale(1) translate(-1%, 0.5%); }
            75% { transform: scale(1.03) translate(0.5%, -1%); }
            100% { transform: scale(1) translate(0, 0); }
        }
        .ken-burns { animation: slow-pan 20s infinite alternate ease-in-out; }

        /* --- Autoplay Progress Bar --- */
        @keyframes progress-bar {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .animate-progress { animation: progress-bar 5.5s linear forwards; }

        /* --- Premium Glass Card (Strict 16:9) --- */
        .premium-glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.1);
            transform-style: preserve-3d;
            transition: box-shadow 0.3s ease; 
        }

        /* --- Google Glow Effect --- */
        .google-glow-container {
            position: relative;
            background: white;
            padding: 20px;
            border-radius: 2rem;
            display: inline-flex;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            cursor: pointer;
        }
        .google-glow-container:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 
                -10px -10px 25px rgba(66, 133, 244, 0.3), 
                10px -10px 25px rgba(234, 67, 53, 0.3), 
                10px 10px 25px rgba(251, 188, 4, 0.3), 
                -10px 10px 25px rgba(52, 168, 83, 0.3);
        }

        .text-gradient-vibrant {
            background: linear-gradient(135deg, #4285F4, #EA4335, #FBBC04, #34A853);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* --- Entrance Animations --- */
        .anim-element { opacity: 0; }
        .slide-in { animation: elegantSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .pop-in { animation: popOut 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        @keyframes elegantSlideUp {
            from { opacity: 0; transform: translateY(30px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        @keyframes popOut {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .d-1 { animation-delay: 0.1s; } .d-2 { animation-delay: 0.2s; }
        .d-3 { animation-delay: 0.3s; } .d-4 { animation-delay: 0.4s; }
        .d-5 { animation-delay: 0.5s; } .d-6 { animation-delay: 0.6s; }

        /* Hide scrollbar for clean 16:9 view */
        ::-webkit-scrollbar { display: none; }
        
        /* Scanline Overlay for Recording */
        .scanlines {
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.05) 50%, rgba(0,0,0,0.05));
            background-size: 100% 4px;
        }
    </style>
</head>
<body class="p-2 md:p-6 lg:p-8">
    <div id="root" class="w-full max-w-[1400px] mx-auto flex items-center justify-center"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Global Store for Image Positions ---
        const globalImagePositions = {};

        const AnimatedNumber = ({ valueStr }) => {
            const [displayValue, setDisplayValue] = useState("0");
            
            useEffect(() => {
                if (!valueStr) return;
                if (valueStr === "∞") { 
                    setDisplayValue("∞"); 
                    return; 
                }
                
                const match = String(valueStr).match(/^([^\d]*)(\d+)([^\d]*)$/);
                if (!match) { 
                    setDisplayValue(valueStr); 
                    return; 
                }
                
                const prefix = match[1];
                const target = parseInt(match[2], 10);
                const suffix = match[3];
                
                let start = null;
                let animationFrameId;
                
                const step = (ts) => {
                    if (!start) start = ts;
                    const progress = Math.min((ts - start) / 2000, 1);
                    const easeProgress = 1 - Math.pow(1 - progress, 4); 
                    const currentNum = Math.floor(easeProgress * target);
                    
                    setDisplayValue(`${prefix}${currentNum}${suffix}`);
                    
                    if (progress < 1) {
                        animationFrameId = window.requestAnimationFrame(step);
                    } else {
                        setDisplayValue(`${prefix}${target}${suffix}`);
                    }
                };
                
                animationFrameId = window.requestAnimationFrame(step);
                return () => window.cancelAnimationFrame(animationFrameId);
            }, [valueStr]);
            
            return <>{displayValue}</>;
        };

        const DraggableImage = ({ id, src, className, alt, initialPos = 50, initialPosX = 50, initialPosY = null, axis = 'y', objectFit = 'object-cover' }) => {
            const startYVal = initialPosY !== null ? initialPosY : initialPos;
            
            const [posX, setPosX] = useState(() => id && globalImagePositions[`${id}_x`] !== undefined ? globalImagePositions[`${id}_x`] : initialPosX);
            const [posY, setPosY] = useState(() => id && globalImagePositions[`${id}_y`] !== undefined ? globalImagePositions[`${id}_y`] : startYVal);
            
            const [isDragging, setIsDragging] = useState(false);
            const startX = useRef(0);
            const startY = useRef(0);

            const handleStart = (x, y) => {
                setIsDragging(true);
                startX.current = x;
                startY.current = y;
            };

            const handleMove = (x, y) => {
                if (!isDragging) return;
                
                if (axis === 'x' || axis === 'both') {
                    const deltaX = x - startX.current;
                    setPosX((prev) => {
                        const newX = Math.min(100, Math.max(0, prev - deltaX * 0.4));
                        if (id) globalImagePositions[`${id}_x`] = newX;
                        return newX;
                    });
                    startX.current = x;
                }
                if (axis === 'y' || axis === 'both') {
                    const deltaY = y - startY.current;
                    setPosY((prev) => {
                        const newY = Math.min(100, Math.max(0, prev - deltaY * 0.4));
                        if (id) globalImagePositions[`${id}_y`] = newY;
                        return newY;
                    });
                    startY.current = y;
                }
            };

            const handleEnd = () => setIsDragging(false);

            let cursorClass = 'cursor-ns-resize';
            if (axis === 'x') cursorClass = 'cursor-ew-resize';
            if (axis === 'both') cursorClass = 'cursor-move';

            return (
                <div 
                    className={`relative overflow-hidden group/drag h-full w-full ${cursorClass}`}
                    onMouseDown={(e) => handleStart(e.clientX, e.clientY)}
                    onMouseMove={(e) => handleMove(e.clientX, e.clientY)}
                    onMouseUp={handleEnd}
                    onMouseLeave={handleEnd}
                    onTouchStart={(e) => handleStart(e.touches[0].clientX, e.touches[0].clientY)}
                    onTouchMove={(e) => handleMove(e.touches[0].clientX, e.touches[0].clientY)}
                    onTouchEnd={handleEnd}
                >
                    <img 
                        src={src} 
                        className={`w-full h-full pointer-events-none ken-burns ${objectFit} ${className || ''}`}
                        style={{ objectPosition: `${posX}% ${posY}%` }} 
                        alt={alt} 
                        draggable={false}
                    />
                    <div className={`absolute top-3 right-3 bg-black/60 text-white text-[10px] px-2.5 py-1 rounded-full pointer-events-none flex items-center gap-1.5 backdrop-blur-sm border border-white/20 z-50 transition-opacity duration-300 ${isDragging ? 'opacity-100' : 'opacity-0 group-hover/drag:opacity-100'}`}>
                        <i className={`fa-solid ${axis === 'both' ? 'fa-arrows-up-down-left-right' : 'fa-arrows-up-down'}`}></i>
                    </div>
                </div>
            );
        };

        const TechParticles = () => (
            <div className="fixed inset-0 pointer-events-none z-[-2] overflow-hidden opacity-30">
                {[...Array(15)].map((_, i) => (
                    <div key={i} className="absolute text-blue-500/30 text-3xl mix-blend-multiply" 
                         style={{
                             top: `${Math.random() * 100}%`, 
                             left: `${Math.random() * 100}%`, 
                             animation: `float-complex-${(i % 2) + 1} ${15 + Math.random() * 20}s infinite alternate-reverse ease-in-out`,
                         }}>
                         <i className={['fa-solid fa-plus', 'fa-regular fa-circle', 'fa-solid fa-star-of-life', 'fa-solid fa-microchip'][i % 4]}></i>
                    </div>
                ))}
            </div>
        );

        const App = () => {
            const [current, setCurrent] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [toastMsg, setToastMsg] = useState(null);
            const [autoZoomIndex, setAutoZoomIndex] = useState(-1);
            const cardRef = useRef(null); 
            const mediaRecorderRef = useRef(null);
            const streamRef = useRef(null);
            
            const isRecordingRef = useRef(isRecording);
            useEffect(() => {
                isRecordingRef.current = isRecording;
            }, [isRecording]);

            const slides = [
                {
                    id: 0,
                    customIcon: (
                        <div className="google-glow-container">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" className="w-16 h-16" alt="Google Logo" />
                        </div>
                    ),
                    title: "Gemini in Education",
                    subtitle: <span className="text-gradient-vibrant font-black text-2xl md:text-4xl tracking-tight">"Нэг баг - Нэг аргазүй" аян</span>,
                    content: (
                        <div className="space-y-3 mt-6">
                            <p className="text-2xl font-black text-slate-800 tracking-widest">БИД ХАМТДАА МХБ</p>
                            <p className="text-lg text-slate-500 font-medium">
                                Мэдээлэл зүйн багш Б.Содномбалжир <span className="mx-2 text-slate-300">|</span> Монгол хэлний багш Д.Хоролмаа
                            </p>
                        </div>
                    ),
                    layout: "center",
                    badge: { text: "GOOGLE AI СУРГАЛТ", color: "bg-blue-100 text-blue-700 border-blue-200" }
                },
                {
                    id: 1,
                    icon: "fa-solid fa-clock-rotate-left",
                    iconColor: "text-yellow-500",
                    title: "Ачааллыг бууруулах нь",
                    subtitle: "Цаг хугацаа хэмнэх ухаалаг шийдэл",
                    content: (
                        <div className="flex flex-col items-center">
                            <span className="inline-flex items-center px-4 py-1.5 mb-4 bg-blue-50 text-blue-600 rounded-full text-xs font-extrabold tracking-widest uppercase border border-blue-100 shadow-sm">
                                <i className="fa-solid fa-globe mr-2 text-sm"></i> Олон улсын туршлагаас
                            </span>
                            <p>Gemini AI нь өдөр тутмын төлөвлөгөө боловсруулах, даалгавар бэлтгэх цагийг эрс багасгасан нь бодитоор батлагдсан.</p>
                        </div>
                    ),
                    stats: [
                        { value: "-45%", label: "Цаг хэмнэлт", desc: "Хичээл бэлтгэл", textColor: "text-yellow-600" },
                        { value: "4x", label: "Хурд", desc: "Контент боловсруулалт", textColor: "text-blue-600" }
                    ],
                    layout: "stats",
                    badge: { text: "ҮР АШИГ", color: "bg-yellow-100 text-yellow-700 border-yellow-200" }
                },
                {
                    id: 2,
                    icon: "fa-solid fa-lightbulb",
                    iconColor: "text-green-500",
                    title: "Интерактив сургалт",
                    subtitle: "Сурагчдын идэвх оролцоог нэмэгдүүлэх",
                    content: (
                        <div className="flex flex-col items-center">
                            <span className="inline-flex items-center px-4 py-1.5 mb-4 bg-emerald-50 text-emerald-600 rounded-full text-xs font-extrabold tracking-widest uppercase border border-emerald-100 shadow-sm">
                                <i className="fa-solid fa-earth-americas mr-2 text-sm"></i> Олон улсын туршлагаас
                            </span>
                            <p>Canvas Pro болон Gemini-г хослуулснаар хичээлийг илүү сонирхолтой, ойлгомжтой болгодог нь нотлогдсон.</p>
                        </div>
                    ),
                    stats: [
                        { value: "+40%", label: "Идэвх", desc: "Сурагчдын оролцоо", textColor: "text-green-600" },
                        { value: "100%", label: "Шинэчлэл", desc: "Арга зүйн өөрчлөлт", textColor: "text-red-600" }
                    ],
                    layout: "stats",
                    badge: { text: "ИННОВАЦИ", color: "bg-green-100 text-green-700 border-green-200" }
                },
                {
                    id: 3,
                    icon: "fa-solid fa-laptop-code",
                    iconColor: "text-indigo-500",
                    bannerImage: "https://raw.githubusercontent.com/sodnomict-art/my-web-images/main/eb0e020a-f040-432f-abc3-875744ec2dcc.jpeg",
                    title: "Canvas Pro & Gemini",
                    subtitle: "Интерактив даалгавар үүсгэх практик",
                    content: (
                        <div className="space-y-4 text-left max-w-4xl mx-auto flex flex-col items-center justify-center">
                            <p className="text-lg md:text-xl text-slate-600 font-medium leading-relaxed text-center px-4">
                                Сургалтын хүрээнд Gemini-ийн <span className="font-bold text-indigo-600">Canvas Pro</span> тохиргоог танилцуулж, интерактив дасгал даалгаврыг хялбар аргаар хэрхэн үүсгэх практик дадлага хийлээ.
                            </p>
                            
                            <div className="bg-indigo-50/80 border-l-4 border-indigo-500 p-5 w-full rounded-r-2xl shadow-sm relative overflow-hidden hover:scale-[1.02] transition-transform">
                                <i className="fa-solid fa-quote-left absolute top-3 right-4 text-indigo-100 text-4xl"></i>
                                <p className="text-indigo-900 font-semibold text-base md:text-lg relative z-10 pl-2">
                                    <i className="fa-solid fa-check-double mr-2 text-indigo-500"></i>
                                    Гол үр дүн: Багш нар үүсгэсэн даалгавраа хэрхэн зөв татаж авах, шууд ашиглах аргачлалыг эзэмшсэн.
                                </p>
                            </div>
                        </div>
                    ),
                    highlights: [
                        { icon: "fa-sliders", text: "Canvas Pro тохиргоо", color: "text-blue-500" },
                        { icon: "fa-wand-magic-sparkles", text: "Даалгавар хялбар үүсгэх", color: "text-purple-500" },
                        { icon: "fa-download", text: "Татаж авах, Ашиглах", color: "text-emerald-500" },
                        { icon: "fa-users-gear", text: "Бодит практик дадлага", color: "text-orange-500" }
                    ],
                    layout: "banner-top",
                    badge: { text: "ГОЛ АГУУЛГА", color: "bg-indigo-100 text-indigo-700 border-indigo-200" }
                },
                {
                    id: 4,
                    image: "https://raw.githubusercontent.com/sodnomict-art/my-web-images/main/da626f58-dfba-420d-b93c-ed924631fc51.jpeg",
                    title: "Багшийн AI Гарын авлага",
                    subtitle: "Хүчирхэг Prompt & AI Хэрэгслүүд",
                    content: "Сургалтын үр дүнг бататгах зорилгоор багш бүрт өдөр тутмын ажилд хэрэгцээтэй AI хэрэгслүүдийн жагсаалт болон хиймэл оюунтай оновчтой харилцах 'Prompt' (Шидэт үг) бичих аргачлал бүхий гарын авлагыг гардуулж өглөө.",
                    highlights: [
                        { icon: "fa-wand-magic-sparkles", text: "Prompt бичих томьёо", color: "text-purple-500" },
                        { icon: "fa-robot", text: "Хэрэгцээт AI жагсаалт", color: "text-blue-500" },
                        { icon: "fa-book-bookmark", text: "Багш бүрт хүртээмжтэй", color: "text-emerald-500" }
                    ],
                    layout: "split",
                    badge: { text: "ГАРЫН АВЛАГА", color: "bg-purple-100 text-purple-700 border-purple-200" }
                },
                {
                    id: 5,
                    image: "https://raw.githubusercontent.com/sodnomict-art/my-web-images/main/9090df51-a17f-4a88-84d2-ad86defdbbb8.jpeg",
                    title: "Ирээдүйн боловсрол",
                    subtitle: "Дижитал шилжилтийн үр дүн",
                    content: "Гуулин тосгоны ЕБС-ийн 16 багш сургалтад амжилттай хамрагдаж, хиймэл оюун ухааны технологиор бүрэн зэвсэглэлээ. Бидний өмнө сургалтын чанарыг сайжруулах хязгааргүй боломж нээгдлээ.",
                    stats: [
                        { value: "16", label: "Багш", desc: "Мэргэшсэн хамт олон", textColor: "text-blue-600" },
                        { value: "∞", label: "Боломж", desc: "Гэрэлт ирээдүй", textColor: "text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-500 drop-shadow-md" }
                    ],
                    layout: "final",
                    badge: { text: "АМЖИЛТТАЙ ӨНДӨРЛӨЛӨӨ", color: "bg-gradient-to-r from-emerald-400 to-teal-500 text-white border-white shadow-lg scale-110" }
                },
                {
                    id: 6,
                    title: "",
                    subtitle: "",
                    layout: "gallery",
                    images: [
                        "https://raw.githubusercontent.com/sodnomict-art/TAILANPIC/main/Screenshot%202026-05-14%20150000.png",
                        "https://raw.githubusercontent.com/sodnomict-art/TAILANPIC/main/Screenshot%202026-05-14%20150026.png",
                        "https://raw.githubusercontent.com/sodnomict-art/TAILANPIC/main/Screenshot%202026-05-14%20150049.png",
                        "https://raw.githubusercontent.com/sodnomict-art/TAILANPIC/main/Screenshot%202026-05-14%20150108.png",
                        "https://raw.githubusercontent.com/sodnomict-art/TAILANPIC/main/Screenshot%202026-05-14%20150259.png"
                    ]
                }
            ];

            useEffect(() => {
                let interval;
                if (isPlaying) {
                    interval = setInterval(() => {
                        setCurrent(c => {
                            if (isRecordingRef.current && c === slides.length - 1) {
                                return c; 
                            }
                            return (c + 1) % slides.length;
                        });
                    }, 5500);
                }
                return () => clearInterval(interval);
            }, [isPlaying, slides.length]);

            // 2. Бичлэгийг автоматаар зогсоож татах (Сүүлийн слайд)
            useEffect(() => {
                let timeout;
                if (isRecording && current === slides.length - 1) {
                    // 7-р слайдын бүх 5 зураг 1с-ээр томорч дуусахыг хүлээгээд (7.5 секунд) зогсоно
                    timeout = setTimeout(() => {
                        setToastMsg("Тайлан амжилттай дууслаа. Видеог татаж байна...");
                        stopRecording();
                    }, 7500); 
                }
                return () => clearTimeout(timeout);
            }, [current, isRecording]);

            // 3. Видео горимд 7-р слайдын зургуудыг автоматаар томруулах
            useEffect(() => {
                let interval;
                if (isPlaying && current === slides.length - 1) {
                    let idx = 0;
                    setAutoZoomIndex(idx);
                    interval = setInterval(() => {
                        idx++;
                        if (idx < slides[current].images.length) {
                            setAutoZoomIndex(idx);
                        } else {
                            setAutoZoomIndex(-1);
                        }
                    }, 1000); // Зураг бүр дээр 1 секунд зогсож томорно
                } else {
                    setAutoZoomIndex(-1);
                }
                return () => clearInterval(interval);
            }, [isPlaying, current]);

            const handleMouseMove = (e) => {
                if (cardRef.current) {
                    const x = (e.clientX / window.innerWidth - 0.5) * 6; 
                    const y = (e.clientY / window.innerHeight - 0.5) * -6;
                    cardRef.current.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
                }
            };
            
            const handleMouseLeave = () => {
                if (cardRef.current) {
                    cardRef.current.style.transform = `rotateY(0deg) rotateX(0deg)`;
                }
            };

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getDisplayMedia({ video: { preferCurrentTab: true }, audio: false });
                    streamRef.current = stream;
                    const recorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = recorder;
                    const chunks = [];
                    
                    recorder.ondataavailable = e => {
                        if (e.data.size > 0) chunks.push(e.data);
                    };
                    
                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'Gemini_Report_Cinematic.webm';
                        a.click();
                        URL.revokeObjectURL(url);
                        setIsRecording(false);
                    };
                    
                    stream.getVideoTracks()[0].onended = () => {
                        if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
                            mediaRecorderRef.current.stop();
                        }
                    };

                    recorder.start();
                    setIsRecording(true);
                    setCurrent(0);
                    setIsPlaying(true);
                    
                } catch (err) {
                    console.error("Recording failed", err);
                    setToastMsg("Видео бичих эрх олгогдсонгүй. Файлыг татаж аваад өөрийн хөтөч дээр нээнэ үү.");
                    setTimeout(() => setToastMsg(null), 5000);
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
                    mediaRecorderRef.current.stop();
                }
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(track => track.stop());
                }
                setIsRecording(false);
                setIsPlaying(false);
            };

            const slide = slides[current];

            return (
                <div className="w-full flex items-center justify-center relative overflow-hidden"
                     onMouseMove={handleMouseMove}
                     onMouseLeave={handleMouseLeave}>
                    
                    <div className={`vibrant-bg ${isRecording ? 'recording-fast' : ''}`}></div>
                    
                    {/* Animated Ambient Blobs & Particles */}
                    <div className="absolute inset-0 pointer-events-none z-[-3] overflow-hidden filter blur-[80px]">
                        <div className="ambient-blob ambient-p-1 bg-blue-400 w-[50vw] h-[50vw] -top-20 -left-20 mix-blend-multiply opacity-40"></div>
                        <div className="ambient-blob ambient-p-2 bg-purple-400 w-[45vw] h-[45vw] top-[20%] right-[5%] mix-blend-multiply opacity-30"></div>
                        <div className="ambient-blob ambient-p-3 bg-pink-400 w-[55vw] h-[55vw] -bottom-20 left-[15%] mix-blend-multiply opacity-30"></div>
                    </div>
                    <TechParticles />

                    {/* --- CINEMATIC OVERLAY FOR RECORDING --- */}
                    <div className={`fixed inset-0 pointer-events-none z-[90] transition-opacity duration-1000 ${isRecording ? 'opacity-100' : 'opacity-0'}`}>
                        <div className="absolute top-0 w-full h-[4vh] bg-black/40 backdrop-blur-sm"></div>
                        <div className="absolute bottom-0 w-full h-[4vh] bg-black/40 backdrop-blur-sm"></div>
                        <div className="absolute top-[8vh] left-[4vw] w-12 h-12 border-t-4 border-l-4 border-white/40 rounded-tl-xl"></div>
                        <div className="absolute top-[8vh] right-[4vw] w-12 h-12 border-t-4 border-r-4 border-white/40 rounded-tr-xl"></div>
                        <div className="absolute bottom-[8vh] left-[4vw] w-12 h-12 border-b-4 border-l-4 border-white/40 rounded-bl-xl"></div>
                        <div className="absolute bottom-[8vh] right-[4vw] w-12 h-12 border-b-4 border-r-4 border-white/40 rounded-br-xl"></div>
                        <div className="absolute inset-0 scanlines opacity-50"></div>
                    </div>

                    {/* Progress Bar shown during Autoplay/Recording */}
                    {isPlaying && (
                        <div className="fixed top-0 left-0 w-full h-1.5 bg-white/10 z-[100]">
                            <div key={current} className="h-full bg-gradient-to-r from-blue-400 via-purple-500 to-pink-500 animate-progress"></div>
                        </div>
                    )}

                    {/* Recording Indicator */}
                    {isRecording && (
                        <div className="fixed top-6 right-6 z-[100] flex items-center gap-3 bg-red-600/90 backdrop-blur-md px-4 py-2 rounded-full border border-red-400 shadow-[0_0_20px_rgba(220,38,38,0.6)]">
                            <div className="w-2.5 h-2.5 bg-white rounded-full animate-pulse"></div>
                            <span className="text-white font-black text-xs tracking-widest uppercase">REC</span>
                        </div>
                    )}

                    {/* Main Content Card - STRICT 16:9 Aspect Ratio Container */}
                    <div ref={cardRef} 
                         className="w-full max-w-[1280px] aspect-video premium-glass-card rounded-[1.5rem] lg:rounded-[2.5rem] p-6 lg:p-10 z-10 flex flex-col relative overflow-hidden shadow-2xl mx-auto my-auto border-white/60">
                        
                        {/* Дотоод header */}
                        <div className="absolute top-6 left-6 lg:top-8 lg:left-8 flex items-center z-50 bg-white/80 backdrop-blur-lg p-1.5 pr-4 rounded-full shadow-md border border-white/50 hover:bg-white transition-colors duration-300">
                            <img src="https://raw.githubusercontent.com/sodnomict-art/my-web-images/main/429003238_413778061128630_6168428532216527806_n_1251461419425659.png" 
                                 className="w-10 h-10 lg:w-12 lg:h-12 rounded-full border-2 border-white shadow-sm mr-3 object-cover" alt="School Logo" />
                            <div className="flex flex-col">
                                <span className="text-blue-900 font-black text-[9px] lg:text-[10px] uppercase tracking-widest leading-none">МУГБ Д.Жамьянгийн нэрэмжит</span>
                                <span className="text-slate-500 text-[8px] lg:text-[9px] uppercase font-bold mt-1 tracking-wider">Гуулин тосгоны ЕБС</span>
                            </div>
                        </div>

                        {/* Slide Content Area */}
                        <div key={current} className="relative w-full flex-1 min-h-0 flex flex-col items-center justify-center pt-8 pb-10 lg:pb-12">
                            
                            {slide.badge && (
                                <div className={`anim-element slide-in d-1 absolute top-0 right-0 px-4 py-1.5 lg:px-5 lg:py-2 rounded-full text-[9px] lg:text-[11px] font-black border shadow-md ${slide.badge.color}`}>
                                    {slide.badge.text}
                                </div>
                            )}

                            {/* Center Layout */}
                            {slide.layout === "center" && (
                                <div className="text-center w-full max-w-4xl mx-auto px-4 flex flex-col items-center justify-center h-full">
                                    <div className="anim-element pop-in d-2 mb-6 lg:mb-8 flex justify-center">
                                        {slide.customIcon || <i className={`${slide.icon} text-6xl lg:text-7xl ${slide.iconColor}`}></i>}
                                    </div>
                                    <h2 className="anim-element slide-in d-3 text-5xl md:text-7xl font-black text-slate-800 mb-4 lg:mb-6 tracking-tighter leading-tight">{slide.title}</h2>
                                    <div className="anim-element slide-in d-4 mb-6 lg:mb-8">{slide.subtitle}</div>
                                    <div className="anim-element slide-in d-5 text-lg text-slate-600 leading-relaxed font-medium">{slide.content}</div>
                                    
                                    {slide.highlights && (
                                        <div className="flex flex-wrap justify-center gap-4 mt-8 lg:mt-12">
                                            {slide.highlights.map((h, i) => (
                                                <div key={i} className="px-6 py-3 bg-white/80 rounded-2xl text-sm font-bold shadow-sm flex items-center border border-slate-100 anim-element pop-in hover:shadow-md hover:-translate-y-1 transition-all" style={{animationDelay: `${0.6+i*0.1}s`}}>
                                                    <i className={`${h.icon} mr-3 ${h.color} text-lg`}></i>{h.text}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Banner Top Layout */}
                            {slide.layout === "banner-top" && (
                                <div className="flex flex-col w-full h-full items-center justify-start mt-4 lg:mt-2">
                                    <div className="w-[95%] lg:w-[85%] h-[42%] lg:h-[48%] rounded-[1.5rem] lg:rounded-[2rem] overflow-hidden shadow-xl border-[4px] lg:border-[6px] border-white anim-element pop-in d-1 relative flex-shrink-0 group mb-4 lg:mb-6">
                                        <DraggableImage id={`banner-${slide.id}`} src={slide.bannerImage} className="w-full h-full ken-burns" alt="Banner" initialPos={0} axis="both" objectFit="object-cover" />
                                        <div className="absolute inset-0 bg-gradient-to-t from-slate-900/80 via-slate-900/20 to-transparent pointer-events-none"></div>
                                        <div className="absolute inset-0 bg-gradient-to-b from-white/30 to-transparent mix-blend-overlay pointer-events-none"></div>
                                        <div className="absolute bottom-4 left-4 lg:bottom-6 lg:left-8 flex items-center gap-3 lg:gap-5 pointer-events-none">
                                            <div className="w-12 h-12 lg:w-16 lg:h-16 bg-white/95 backdrop-blur-md rounded-xl flex items-center justify-center shadow-lg border border-white/50">
                                                <i className={`${slide.icon} text-2xl lg:text-4xl ${slide.iconColor}`}></i>
                                            </div>
                                            <div>
                                                <h2 className="text-3xl md:text-5xl lg:text-6xl font-black text-white tracking-tight drop-shadow-xl">{slide.title}</h2>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="w-full max-w-4xl text-center px-4 flex flex-col items-center flex-1 min-h-0 justify-center">
                                        <h3 className="anim-element slide-in d-3 text-xl lg:text-3xl text-indigo-600 font-extrabold mb-3 lg:mb-4 tracking-wide">{slide.subtitle}</h3>
                                        <div className="anim-element slide-in d-4 mb-4 lg:mb-6 w-full line-clamp-3 lg:line-clamp-none">{slide.content}</div>
                                        
                                        {slide.highlights && (
                                            <div className="flex flex-wrap justify-center gap-2 lg:gap-4 w-full mt-auto pb-2">
                                                {slide.highlights.map((h, i) => (
                                                    <div key={i} className="px-4 py-2 lg:px-6 lg:py-3 bg-white/90 rounded-xl text-xs lg:text-sm font-bold shadow-sm flex items-center border border-slate-100 anim-element pop-in hover:shadow-md hover:-translate-y-1 transition-all" style={{animationDelay: `${0.5+i*0.1}s`}}>
                                                        <i className={`${h.icon} mr-2 ${h.color} text-base lg:text-xl`}></i>{h.text}
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* Split Layout */}
                            {slide.layout === "split" && (
                                <div className="flex flex-row items-center justify-between gap-6 lg:gap-10 text-left w-full h-full px-4 lg:px-8 mt-4">
                                    <div className="w-7/12 flex flex-col justify-center">
                                        <h2 className="anim-element slide-in d-2 text-4xl lg:text-5xl font-black text-slate-800 mb-3 lg:mb-5 tracking-tight leading-tight">{slide.title}</h2>
                                        <h3 className="anim-element slide-in d-3 text-xl lg:text-2xl text-blue-600 font-extrabold mb-4 lg:mb-6">{slide.subtitle}</h3>
                                        <div className="anim-element slide-in d-4 text-slate-600 mb-6 lg:mb-8 text-base lg:text-lg font-medium leading-relaxed">{slide.content}</div>
                                        
                                        <div className="grid grid-cols-1 gap-2 lg:gap-3 sm:grid-cols-2">
                                            {slide.highlights && slide.highlights.map((h, i) => (
                                                <div key={i} className="px-4 py-3 lg:px-5 lg:py-4 bg-white/80 rounded-2xl text-sm lg:text-base font-bold shadow-sm flex items-center border border-slate-100 anim-element pop-in hover:-translate-y-1 transition-transform" style={{animationDelay: `${0.5+i*0.1}s`}}>
                                                    <i className={`${h.icon} mr-3 ${h.color} text-lg lg:text-xl`}></i>{h.text}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <div className="w-5/12 h-full py-4 anim-element pop-in d-3 flex justify-center items-center">
                                        <div className="h-[90%] lg:h-[95%] aspect-[3/4] max-w-full rounded-[1.5rem] lg:rounded-[2rem] overflow-hidden shadow-xl border-[4px] lg:border-[6px] border-white transform rotate-2 hover:rotate-0 transition-transform duration-700 bg-slate-100 relative group">
                                            <DraggableImage id={`split-${slide.id}`} src={slide.image} className="w-full h-full ken-burns" alt="Image" initialPos={10} axis="both" objectFit="object-cover" />
                                            <div className="absolute inset-0 bg-gradient-to-t from-slate-900/20 to-transparent pointer-events-none"></div>
                                            <div className="absolute inset-0 ring-1 ring-inset ring-black/10 rounded-[1.5rem] lg:rounded-[2rem] pointer-events-none"></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Stats Layout */}
                            {slide.layout === "stats" && (
                                <div className="text-center flex flex-col items-center justify-center h-full w-full px-4">
                                    {slide.icon && (
                                        <div className="anim-element pop-in d-2 mb-4 lg:mb-6 flex justify-center">
                                            <i className={`${slide.icon} text-6xl lg:text-7xl ${slide.iconColor}`}></i>
                                        </div>
                                    )}
                                    <h2 className="anim-element slide-in d-3 text-5xl lg:text-6xl font-black text-slate-800 mb-3 lg:mb-4 tracking-tighter leading-tight">{slide.title}</h2>
                                    <h3 className="anim-element slide-in d-4 text-xl lg:text-2xl text-slate-500 font-extrabold mb-6 lg:mb-8">{slide.subtitle}</h3>
                                    
                                    <div className="anim-element slide-in d-5 text-base lg:text-lg text-slate-600 font-medium max-w-2xl mx-auto mb-8 lg:mb-10">
                                        {slide.content}
                                    </div>

                                    {slide.stats && (
                                        <div className="flex flex-row justify-center gap-4 lg:gap-8 w-full">
                                            {slide.stats.map((stat, idx) => (
                                                <div key={idx} className="bg-white/60 p-6 lg:p-8 rounded-2xl lg:rounded-[2rem] shadow-sm border border-slate-100 flex flex-col items-center anim-element pop-in hover:-translate-y-2 transition-transform w-48 lg:w-60" style={{animationDelay: `${0.6+idx*0.1}s`}}>
                                                    <div className={`text-5xl lg:text-6xl font-black mb-2 ${stat.textColor}`}>
                                                        <AnimatedNumber valueStr={stat.value} />
                                                    </div>
                                                    <div className="text-lg lg:text-xl font-bold text-slate-800 mb-1">{stat.label}</div>
                                                    <div className="text-sm lg:text-sm text-slate-500 font-medium text-center">{stat.desc}</div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Final Summary Layout */}
                            {slide.layout === "final" && (
                                <div className="flex flex-row items-center justify-between gap-6 lg:gap-10 w-full h-full text-left px-4 lg:px-8 mt-4">
                                    <div className="w-5/12 flex flex-col justify-center">
                                        <h2 className="anim-element slide-in d-2 text-4xl lg:text-6xl font-black text-slate-800 mb-3 lg:mb-5 tracking-tight leading-tight">{slide.title}</h2>
                                        <h3 className="anim-element slide-in d-3 text-xl lg:text-2xl text-emerald-600 font-extrabold mb-5 lg:mb-8">{slide.subtitle}</h3>
                                        <p className="anim-element slide-in d-4 text-slate-600 mb-6 lg:mb-8 text-base lg:text-lg font-medium leading-relaxed">{slide.content}</p>
                                        
                                        {slide.stats && (
                                            <div className="grid grid-cols-2 gap-3 lg:gap-5 anim-element slide-in d-5">
                                                {slide.stats.map((stat, idx) => (
                                                    <div key={idx} className="bg-white/80 p-4 lg:p-5 rounded-2xl lg:rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center justify-center text-center">
                                                        <div className={`text-4xl lg:text-5xl font-black mb-1 ${stat.textColor}`}>
                                                            <AnimatedNumber valueStr={stat.value} />
                                                        </div>
                                                        <div className="text-sm lg:text-lg font-bold text-slate-800">{stat.label}</div>
                                                        <div className="text-[10px] lg:text-xs text-slate-500 mt-1">{stat.desc}</div>
                                                    </div>
                                                ))}

                                        )}

                                    <div className="w-7/12 h-full py-4 anim-element pop-in d-4 flex justify-center items-center">

                                            <DraggableImage id={`final-${slide.id}`} src={slide.image} className="w-full h-full ken-burns" alt="Ирээдүйн боловсрол" initialPos={40} axis="both" objectFit="object-cover" />
                                            <div className="absolute inset-0 bg-gradient-to-t from-slate-900/20 to-transparent pointer-events-none"></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Gallery Layout (СЛАЙД 7 - Дээд талд 2, доод талд 3 зураг) */}
                            {slide.layout === "gallery" && (
                                <div className="flex flex-col items-center justify-center w-full h-full text-center relative px-2 lg:px-4">
                                    <div className="flex-1 min-h-0 w-full flex flex-col justify-center items-center gap-4 lg:gap-6 mx-auto anim-element slide-in d-4 py-2">
                                        
                                        {/* Дээд эгнээ (2 зураг) */}
                                        <div className="flex justify-center items-center gap-6 lg:gap-12 w-full h-[42%] lg:h-[45%]">

                                                const globalIdx = idx;
                                                const rotations = ['-rotate-3', 'rotate-2'];
                                                const isActive = autoZoomIndex === globalIdx;
                                                
                                                const transformClass = isActive 
                                                    ? "scale-[1.3] lg:scale-[1.4] !rotate-0 z-[100]" 
                                                    : "hover:scale-[1.3] lg:hover:scale-[1.4] hover:rotate-0 hover:z-[100]";

                                                    ? "shadow-[0_20px_40px_rgba(0,0,0,0.4)]"

                                                return (
                                                    <div key={globalIdx}

                                                        {/* h-full ба img.w-auto ашиглаж зургийн үндсэн харьцаанд хүрээг нийцүүлсэн */}
                                                        <div className={`h-full inline-block p-1.5 lg:p-2 rounded-xl lg:rounded-2xl border-[3px] lg:border-[4px] border-white bg-white transition-shadow duration-500 ${shadowClass}`}>
                                                            <img 
                                                                src={img} 
                                                                alt={`Сэтгэгдэл ${globalIdx+1}`} 
                                                                className="h-full w-auto object-contain rounded-md lg:rounded-lg bg-slate-50 block"

                                                            {/* Hover & AutoZoom Effect */}
                                                            <div className={`absolute inset-0 bg-pink-500/10 transition-opacity flex items-center justify-center pointer-events-none rounded-xl lg:rounded-2xl ${isActive ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'}`}>
                                                                <div className={`bg-white/90 text-pink-600 w-8 h-8 flex items-center justify-center rounded-full shadow-lg transform transition-transform duration-300 ${isActive ? 'scale-100' : 'scale-50 group-hover:scale-100'}`}>
                                                                    <i className="fa-solid fa-expand text-xs"></i>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>

                                            {slide.images.slice(2, 5).map((img, idx) => {
                                                const globalIdx = idx + 2;
                                                const rotations = ['-rotate-2', 'rotate-0', 'rotate-3'];
                                                const isActive = autoZoomIndex === globalIdx;
                                                
                                                const transformClass = isActive 
                                                    ? "scale-[1.4] lg:scale-[1.5] !rotate-0 z-[100]" 
                                                    : "hover:scale-[1.4] lg:hover:scale-[1.5] hover:rotate-0 hover:z-[100]";
                                                const shadowClass = isActive 
                                                    ? "shadow-[0_20px_40px_rgba(0,0,0,0.4)]" 
                                                    : "shadow-md group-hover:shadow-[0_20px_40px_rgba(0,0,0,0.4)]";

                                                return (
                                                    <div key={globalIdx} 
                                                         className={`relative h-full inline-block transition-transform duration-500 ease-out group cursor-pointer ${rotations[idx]} ${transformClass}`}>
                                                        
                                                        {/* h-full ба img.w-auto ашиглаж зургийн үндсэн харьцаанд хүрээг нийцүүлсэн */}
                                                        <div className={`h-full inline-block p-1.5 lg:p-2 rounded-xl lg:rounded-2xl border-[3px] lg:border-[4px] border-white bg-white transition-shadow duration-500 ${shadowClass}`}>
                                                            <img 
                                                                src={img} 
                                                                alt={`Сэтгэгдэл ${globalIdx+1}`}

                                                            <div className={`absolute inset-0 bg-pink-500/10 transition-opacity flex items-center justify-center pointer-events-none rounded-xl lg:rounded-2xl ${isActive ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'}`}>
                                                                <div className={`bg-white/90 text-pink-600 w-8 h-8 flex items-center justify-center rounded-full shadow-lg transform transition-transform duration-300 ${isActive ? 'scale-100' : 'scale-50 group-hover:scale-100'}`}>
                                                                    <i className="fa-solid fa-expand text-xs"></i>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>

                                    </div>
                                </div>
                            )}

                        <div className={`absolute bottom-4 lg:bottom-6 left-0 w-full px-6 lg:px-12 flex items-center justify-between z-40 transition-all duration-700 ${isRecording ? 'translate-y-20 opacity-0 pointer-events-none' : 'translate-y-0 opacity-100'}`}>
                            {/* Slide Dots */}
                            <div className="flex gap-1.5 lg:gap-2">
                                {slides.map((_, i) => (
                                    <button 
                                        key={i} 
                                        onClick={() => { setCurrent(i); setIsPlaying(false); }}
                                        className={`h-1.5 lg:h-2 transition-all duration-300 rounded-full ${i === current ? 'w-8 lg:w-10 bg-blue-600' : 'w-2 lg:w-2 bg-slate-300 hover:bg-blue-400'}`}
                                        aria-label={`Слайд ${i + 1}`}
                                    />
                                ))}
                            </div>

                            {/* Media Controls */}
                            <div className="flex items-center gap-1.5 bg-white/80 backdrop-blur-md px-2 py-1 lg:px-3 lg:py-1.5 rounded-full shadow-sm border border-slate-200">
                                <button onClick={() => { setCurrent(c => (c - 1 + slides.length) % slides.length); setIsPlaying(false); }} className="w-7 h-7 lg:w-9 lg:h-9 flex items-center justify-center rounded-full text-slate-600 hover:bg-slate-100 transition-colors">
                                    <i className="fa-solid fa-chevron-left text-xs lg:text-sm"></i>
                                </button>
                                
                                <button onClick={() => setIsPlaying(!isPlaying)} className={`w-9 h-9 lg:w-11 lg:h-11 flex items-center justify-center rounded-full text-white shadow-md transition-transform hover:scale-105 active:scale-95 ${isPlaying ? 'bg-amber-500' : 'bg-blue-600'}`}>
                                    <i className={`fa-solid ${isPlaying ? 'fa-pause' : 'fa-play'} ${!isPlaying && 'ml-0.5 lg:ml-1'} text-xs lg:text-sm`}></i>
                                </button>
                                
                                <button onClick={() => { setCurrent(c => (c + 1) % slides.length); setIsPlaying(false); }} className="w-7 h-7 lg:w-9 lg:h-9 flex items-center justify-center rounded-full text-slate-600 hover:bg-slate-100 transition-colors">
                                    <i className="fa-solid fa-chevron-right text-xs lg:text-sm"></i>
                                </button>
                                
                                <div className="w-px h-4 lg:h-5 bg-slate-200 mx-1 lg:mx-2"></div>
                                
                                <button 
                                    onClick={isRecording ? stopRecording : startRecording} 
                                    className={`w-7 h-7 lg:w-9 lg:h-9 flex items-center justify-center rounded-full transition-all text-slate-400 hover:text-slate-700 hover:bg-slate-100`}
                                    title={"Дэлгэцнээс видео бичих"}
                                >
                                    <i className="fa-solid fa-video text-xs lg:text-sm"></i>
                                </button>
                            </div>
                        </div>

                    </div>

                    {/* Toast Notification */}
                    <div className={`fixed top-8 right-8 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4 transition-all duration-500 z-[100] ${toastMsg ? 'translate-y-0 opacity-100' : '-translate-y-10 opacity-0 pointer-events-none'}`}>
                        <i className="fa-solid fa-circle-exclamation text-yellow-500 text-xl"></i>
                        <p className="text-sm font-medium">{toastMsg}</p>
                        <button onClick={() => setToastMsg(null)} className="text-slate-400 hover:text-white ml-2">
                            <i className="fa-solid fa-xmark"></i>
                        </button>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
